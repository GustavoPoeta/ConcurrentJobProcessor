services:
  api:
    build:
      context: .
      dockerfile: ConcurrentJobProcessor/Dockerfile

    container_name: concurrent-job-processor

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8080:8080"
      - "8081:8081"

    depends_on:
      - postgres

  postgres:
    image: postgis/postgis:16-3.4

    container_name: postgres

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: